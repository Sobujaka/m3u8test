<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player & Live Channel Checker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h2 { text-align: center; color: #00ff88; }
        .controls {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        input[type="file"], button {
            padding: 10px 15px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
            margin-right: 10px;
            cursor: pointer;
        }
        button {
            background-color: #00ff88;
            color: #1a1a1a;
            font-weight: bold;
            transition: 0.3s;
        }
        button:disabled { background-color: #555; color: #aaa; cursor: not-allowed; }
        .status {
            font-weight: bold;
            margin-top: 10px;
            color: #ffcc00;
        }
        .main-layout {
            display: flex;
            gap: 20px;
        }
        .player-section { flex: 2; }
        .list-section {
            flex: 1;
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            max-height: 500px;
            overflow-y: auto;
        }
        video {
            width: 100%;
            background: #000;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            padding: 10px;
            background: #3a3a3a;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        li:hover { background: #4a4a4a; }
        .dead-chan { color: #ff4d4d; text-decoration: line-through; }
        .live-chan { color: #00ff88; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<div class="container">
    <h2>IPTV Player & Automatic M3U Filter</h2>
    
    <div class="controls">
        <input type="file" id="m3uFile" accept=".m3u,.txt">
        <button id="startCheckBtn" disabled>চ্যানেল চেক ও ফিল্টার শুরু করুন</button>
        <div class="status" id="statusText">অনুগ্রহ করে একটি M3U বা TXT ফাইল আপলোড করুন...</div>
    </div>

    <div class="main-layout">
        <div class="player-section">
            <video id="videoPlayer" controls></video>
            <h3 id="currentTrack" style="margin-top:10px; color:#00ff88;">এখন চলছে: কোনো চ্যানেল সিলেক্ট করা নেই</h3>
        </div>

        <div class="list-section">
            <h3>চ্যানেল সমূহ (<span id="chanCount">0</span>)</h3>
            <ul id="channelList"></ul>
        </div>
    </div>
</div>

<script>
    let rawChannels = [];
    let validChannels = [];
    let checkingIndex = 0;

    const fileInput = document.getElementById('m3uFile');
    const startBtn = document.getElementById('startCheckBtn');
    const statusText = document.getElementById('statusText');
    const channelListUI = document.getElementById('channelList');
    const chanCountUI = document.getElementById('chanCount');
    const video = document.getElementById('videoPlayer');
    const currentTrackText = document.getElementById('currentTrack');

    // M3U ফাইল রিড করা
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(evt) {
            parseM3U(evt.target.result);
        };
        reader.readAsText(file);
    });

    // M3U টেক্সট পার্স করা
    function parseM3U(text) {
        rawChannels = [];
        const lines = text.split('\n');
        let currentInfo = null;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith('#EXTINF:')) {
                currentInfo = line;
            } else if (line && !line.startsWith('#')) {
                if (currentInfo) {
                    // নাম বের করা
                    let name = currentInfo.split(',').pop() || "Unknown Channel";
                    rawChannels.push({ info: currentInfo, url: line, name: name });
                    currentInfo = null;
                } else {
                    // যদি শুধু লিংক থাকে (EXTINF ছাড়া)
                    rawChannels.push({ info: `#EXTINF:-1,Channel ${rawChannels.length+1}`, url: line, name: `Channel ${rawChannels.length+1}` });
                }
            }
        }

        if (rawChannels.length > 0) {
            statusText.innerText = `${rawChannels.length}টি চ্যানেল পাওয়া গেছে। চেক শুরু করতে বাটনে ক্লিক করুন।`;
            startBtn.disabled = false;
            renderList(rawChannels);
        } else {
            statusText.innerText = "ফাইলে কোনো বৈধ চ্যানেল পাওয়া যায়নি!";
            startBtn.disabled = true;
        }
    }

    // UI-তে চ্যানেল লিস্ট দেখানো
    function renderList(channels) {
        channelListUI.innerHTML = '';
        chanCountUI.innerText = channels.length;
        channels.forEach((chan, index) => {
            let li = document.createElement('li');
            li.innerText = chan.name;
            li.onclick = () => playStream(chan.url, chan.name);
            li.setAttribute('id', 'chan-' + index);
            channelListUI.appendChild(li);
        });
    }

    // ফিল্টারিং এবং অটো-ডিলিট প্রসেস শুরু
    startBtn.addEventListener('click', async () => {
        startBtn.disabled = true;
        fileInput.disabled = true;
        validChannels = [];
        checkingIndex = 0;
        
        statusText.innerText = "চ্যানেল যাচাইকরণ চলছে... দয়া করে অপেক্ষা করুন।";
        await checkNextChannel();
    });

    // একটি একটি করে চ্যানেল ব্যাকগ্রাউন্ডে চেক করা
    async function checkNextChannel() {
        if (checkingIndex >= rawChannels.length) {
            endVerification();
            return;
        }

        let chan = rawChannels[checkingIndex];
        let li = document.getElementById('chan-' + checkingIndex);
        if (li) li.style.background = "#555"; // বর্তমানে চেকিং নির্দেশক

        statusText.innerText = `যাচাই করা হচ্ছে (${checkingIndex + 1}/${rawChannels.length}): ${chan.name}`;

        try {
            // head বা fetch রিকোয়েস্ট দিয়ে চেক করা (Timeout 5 সেকেন্ড)
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), 5000);

            const response = await fetch(chan.url, { method: 'HEAD', signal: controller.signal });
            clearTimeout(id);

            if (response.ok) {
                // সচল চ্যানেল
                validChannels.push(chan);
                if (li) {
                    li.classList.add('live-chan');
                    li.innerHTML = `${chan.name} <span>✓</span>`;
                }
            } else {
                // অচল চ্যানেল (অটো রিমুভ UI থেকে)
                if (li) li.remove();
            }
        } catch (error) {
            // এরর বা ডেড লিংক হলে UI থেকে ডিলেট
            if (li) li.remove();
        }

        checkingIndex++;
        // লাইভ কাউন্ট আপডেট
        chanCountUI.innerText = validChannels.length;
        
        // পরের চ্যানেল চেকে যাওয়া (অল্প বিরতি দিয়ে যাতে ব্রাউজার ফ্রিজ না হয়)
        setTimeout(checkNextChannel, 100);
    }

    // সব চেক শেষ হওয়ার পর নতুন M3U ফাইল ডাউনলোড
    function endVerification() {
        statusText.innerText = `চেকিং সম্পন্ন! সচল চ্যানেল: ${validChannels.length} টি। অচলগুলো বাদ দেওয়া হয়েছে।`;
        renderList(validChannels); // ফাইনাল সচল লিস্ট দেখানো

        if (validChannels.length > 0) {
            downloadM3U(validChannels);
        } else {
            alert("দুঃখিত, কোনো সচল চ্যানেল পাওয়া যায়নি!");
        }
        
        startBtn.disabled = false;
        fileInput.disabled = false;
    }

    // অটো M3U ফাইল তৈরি ও ডাউনলোড
    function downloadM3U(channels) {
        let m3uContent = "#EXTM3U\n";
        channels.forEach(chan => {
            m3uContent += chan.info + "\n" + chan.url + "\n";
        });

        const blob = new Blob([m3uContent], { type: 'text/plain' });
        const dataUrl = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = dataUrl;
        a.download = "Live_Channels_Filtered.m3u";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        
        statusText.innerText += " নতুন ফিল্টার করা M3U ফাইলটি অটো ডাউনলোড হয়েছে।";
    }

    // IPTV ভিডিও প্লে করার ফাংশন (HLS সাপোর্ট সহ)
    function playStream(url, name) {
        currentTrackText.innerText = "এখন চলছে: " + name;
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // সাফারি ব্রাউজারের নিজস্ব সাপোর্টের জন্য
            video.src = url;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        } else {
            alert("আপনার ব্রাউজারে এই ফরম্যাটটি সাপোর্ট করছে না।");
        }
    }
</script>

</body>
</html>
